name: Actualizar datos Mundial 2026

on:
  schedule:
    # Sondeo cada 15 minutos en la franja en la que se disputan partidos del
    # Mundial (16:00-03:59 UTC). El script regenera los datos y los guarda en el
    # repositorio. La web los lee directamente desde el CDN gratuito jsDelivr,
    # asi que no hace falta ningun FTP ni credenciales.
    # Como sondea de forma continua, los retrasos, aplazamientos y prorrogas se
    # cubren solos: en cuanto la fuente publica el partido terminado, el
    # siguiente sondeo (<=15 min despues) lo deja disponible en el CDN.
    - cron: "*/15 16-23 * * *"
    - cron: "*/15 0-3 * * *"
    # La fuente de datos (Bustami) NO publica en vivo: vuelca su tanda diaria una
    # sola vez al dia, normalmente entre las 07:30 y las 09:40 UTC. Antes solo
    # habia una pasada de seguridad a las 05:15, que corria ANTES de esa tanda,
    # asi que los partidos de noche se quedaban sin recoger hasta la franja de
    # las 16:00. Ahora sondeamos cada 15 min de 04:00 a 11:59 UTC para recoger la
    # tanda diaria en cuanto aparezca, con margen para los retrasos de los cron
    # de GitHub Actions.
    - cron: "*/15 4-11 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Evita que dos ejecuciones solapadas se pisen al hacer commit.
concurrency:
  group: actualizar-mundial-2026
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generar datos
        run: python3 actualizar_mundial_2026.py --compact

      - name: Guardar datos en el repositorio
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Actualizar datos Mundial 2026"
          file_pattern: data/mundial_2026_clubes.json data/mundial_2026_clubes.js

      - name: Refrescar la cache del CDN jsDelivr (con verificacion)
        if: steps.commit.outputs.changes_detected == 'true'
        run: |
          repo="${GITHUB_REPOSITORY}"
          js="data/mundial_2026_clubes.js"
          json="data/mundial_2026_clubes.json"
          # Una sola purga "a ciegas" no basta: si se dispara antes de que
          # jsDelivr vea el commit nuevo, vuelve a cachear el dato VIEJO y se
          # queda asi hasta 12 h (s-maxage del alias @main). Para evitar esa
          # carrera, purgamos en bucle hasta confirmar que el CDN sirve
          # EXACTAMENTE el "generated_at" que acabamos de generar.
          want=$(grep -o '"generated_at":"[^"]*"' "$js" | head -1)
          echo "Esperando a que el CDN sirva: $want"
          for i in $(seq 1 20); do
            curl -fsS "https://purge.jsdelivr.net/gh/${repo}@main/${js}"   >/dev/null || true
            curl -fsS "https://purge.jsdelivr.net/gh/${repo}@main/${json}" >/dev/null || true
            got=$(curl -fsS "https://cdn.jsdelivr.net/gh/${repo}@main/${js}" | grep -o '"generated_at":"[^"]*"' | head -1)
            echo "Intento $i: el CDN sirve $got"
            if [ "$got" = "$want" ]; then
              echo "CDN actualizado correctamente."
              exit 0
            fi
            sleep 15
          done
          echo "::warning::El CDN no confirmo la actualizacion tras 20 intentos; seguira propagandose por su cuenta."
